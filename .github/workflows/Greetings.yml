name: Python Greetings Pipeline

on:
  push:
    branches: [ main ]

jobs:

  install-pip-deps:
    runs-on: self-hosted

    steps:
      - name: Checkout pipeline repo
        uses: actions/checkout@v4

      - name: Clone python-greetings repo
        uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: app

      - name: Install dependencies
        working-directory: app
        run: |
          echo Installing dependencies...
          python -m venv venv
          venv\Scripts\python -m pip install -r requirements.txt

  deploy-to-dev:
    runs-on: self-hosted
    needs: install-pip-deps

    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: app

      - name: Deploy DEV
        working-directory: app
        run: |
          echo Deploying to DEV...
          pm2 delete greetings-app-dev & EXIT /B 0
          venv\Scripts\python -m pip install -r requirements.txt
          pm2 start app.py --name greetings-app-dev --interpreter venv\Scripts\python -- --port 7001

  tests-on-dev:
    runs-on: self-hosted
    needs: deploy-to-dev

    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: mtararujs/course-js-api-framework
          path: tests

      - name: Run tests DEV
        working-directory: tests
        run: |
          echo Running tests on DEV...
          npm install
          npm run greetings greetings_dev

  deploy-to-stg:
    runs-on: self-hosted
    needs: tests-on-dev

    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: app

      - name: Deploy STG
        working-directory: app
        run: |
          echo Deploying to STG...
          pm2 delete greetings-app-stg & EXIT /B 0
          venv\Scripts\python -m pip install -r requirements.txt
          pm2 start app.py --name greetings-app-stg --interpreter venv\Scripts\python -- --port 7002

  tests-on-stg:
    runs-on: self-hosted
    needs: deploy-to-stg

    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: mtararujs/course-js-api-framework
          path: tests

      - name: Run tests STG
        working-directory: tests
        run: |
          echo Running tests on STG...
          npm install
          npm run greetings greetings_stg

  deploy-to-preprod:
    runs-on: self-hosted
    needs: tests-on-stg

    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: app

      - name: Deploy PREPROD
        working-directory: app
        run: |
          echo Deploying to PREPROD...
          pm2 delete greetings-app-preprod & EXIT /B 0
          venv\Scripts\python -m pip install -r requirements.txt
          pm2 start app.py --name greetings-app-preprod --interpreter venv\Scripts\python -- --port 7003

  tests-on-preprod:
    runs-on: self-hosted
    needs: deploy-to-preprod

    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: mtararujs/course-js-api-framework
          path: tests

      - name: Run tests PREPROD
        working-directory: tests
        run: |
          echo Running tests on PREPROD...
          npm install
          npm run greetings greetings_preprod

  deploy-to-prod:
    runs-on: self-hosted
    needs: tests-on-preprod

    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: app

      - name: Deploy PROD
        working-directory: app
        run: |
          echo Deploying to PROD...
          pm2 delete greetings-app-prod & EXIT /B 0
          venv\Scripts\python -m pip install -r requirements.txt
          pm2 start app.py --name greetings-app-prod --interpreter venv\Scripts\python -- --port 7004

  tests-on-prod:
    runs-on: self-hosted
    needs: deploy-to-prod

    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: mtararujs/course-js-api-framework
          path: tests

      - name: Run tests PROD
        working-directory: tests
        run: |
          echo Running tests on PROD...
          npm install
          npm run greetings greetings_prod

